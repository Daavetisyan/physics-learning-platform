<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vector Academy{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="Vector Academy home">
      <img src="{{ url_for('static', path='brand/vector-logo-horizontal.svg') }}" alt="Vector Academy">
    </a>
    <nav aria-label="Primary navigation">
      <a href="/dashboard">Dashboard</a>
      <a href="/course/foundations-of-physics">Course</a>
      <a href="/tutoring">Tutor</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>Interactive physics learning prototype · Grades 7–9</footer>
  {% block scripts %}{% endblock %}
</body>
</html>
